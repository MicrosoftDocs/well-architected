### YamlMime:Landing

title: Sustainability workload documentation
summary: Learn how to design sustainability into your Azure architecture from the start by making deliberate design and operational choices that balance efficiency with reliability, security, and performance. This guidance shows how everyday architectural decisions influence resource consumption, where inefficiencies typically emerge in real systems, and how to reduce waste without compromising overall system quality.
metadata: 
  title: Sustainability workload documentation
  description: Apply the design methodology and approach to building Azure workloads that are mindful about carbon emission.
  services: na
  author: PageWriter-MSFT
  ms.author: prwilk
  ms.date: 06/25/2026
  ms.topic: landing-page
  ms.collection: na

